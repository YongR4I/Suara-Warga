<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suara Warga</title>

    <!-- Font & Reset CSS -->
    <link rel="stylesheet" href="assets/css/style.css">

    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind Configuration (Color Palette & Fonts) -->
    <script src="assets/js/tailwind-config.js"></script>

    <style>
        /* Memastikan animasi dropdown smooth */
        .group:hover .group-hover\:visible {
            visibility: visible;
        }
        .group:hover .group-hover\:opacity-100 {
            opacity: 1;
        }
    </style>
</head>
<body class="font-sans antialiased text-[#222] bg-white overflow-x-hidden">

    <!-- Hero Section -->
    <div class="relative min-h-screen bg-cover bg-[center_top] md:bg-center bg-no-repeat w-full flex flex-col" style="background-image: url('assets/images/Hero.jpeg');">

        <!-- Navbar -->
        <nav class="flex items-center justify-between px-6 md:px-12 py-6 w-full max-w-[1600px] mx-auto">
            <!-- Logo -->
            <a href="#" class="flex items-center gap-2.5 z-20">
                <span class="font-sans font-semibold text-[22px] tracking-tight text-[#222]">Suara Warga</span>
            </a>

            <!-- Nav Links -->
            <div class="hidden lg:flex items-center bg-[#292929] rounded-full p-1 text-[13px] font-medium text-[#c0c0c0] shadow-sm z-20">
                <!-- Home (Active) -->
                <a href="#" class="flex items-center gap-1.5 bg-white text-[#222] px-5 py-2 rounded-full shadow-sm">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    Home
                </a>

                <!-- Laporan Dropdown -->
                <div class="relative group">
                    <button class="flex items-center gap-1 px-4 py-2 hover:text-white transition-colors duration-200 cursor-pointer">
                        Laporan
                        <svg class="w-3.5 h-3.5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </button>
                    <!-- Dropdown Menu -->
                    <div class="absolute top-full left-1/2 -translate-x-1/2 mt-3 w-40 bg-white text-[#1a1a1a] rounded-xl shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 z-50 overflow-hidden border border-gray-100">
                        <a href="#" class="block px-4 py-2.5 hover:bg-gray-50 text-[13px] font-medium transition-colors">Laporkan</a>
                        <div class="w-full h-px bg-gray-100"></div>
                        <a href="#" class="block px-4 py-2.5 hover:bg-gray-50 text-[13px] font-medium transition-colors">Lihat Laporan</a>
                    </div>
                </div>

                <a href="#" class="px-5 py-2 hover:text-white transition-colors duration-200">Edukasi</a>
                <a href="#" class="px-5 py-2 hover:text-white transition-colors duration-200">Komunitas</a>
                <a href="#" class="px-5 py-2 hover:text-white transition-colors duration-200">Dashboard</a>
            </div>

            <!-- Mobile Hamburger Button -->
            <button class="lg:hidden flex items-center justify-center p-2 text-[#222] z-20 focus:outline-none">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>

            <!-- Right Spacer -->
            <div class="w-[120px] hidden lg:block z-20"></div>
        </nav>

        <!-- Hero Content -->
        <main class="flex flex-col items-center text-center mt-6 md:mt-10 lg:mt-12 px-4 w-full relative z-10 flex-grow">

            <!-- Decorative Elements -->
            <!-- Bintang Kiri Atas -->
            <svg class="absolute left-[5%] md:left-[15%] lg:left-[18%] top-[-10px] md:top-[-20px] w-5 h-5 md:w-6 md:h-6 text-[#284f47] fill-current opacity-90" viewBox="0 0 24 24"><path d="M12 0C12 6.62742 6.62742 12 0 12C6.62742 12 12 17.3726 12 24C12 17.3726 17.3726 12 24 12C17.3726 12 12 6.62742 12 0Z"/></svg>
            <!-- Bintang Kanan Atas -->
            <svg class="hidden md:block absolute right-[12%] md:right-[18%] lg:right-[20%] top-[30px] w-4 h-4 text-[#284f47] fill-current opacity-80" viewBox="0 0 24 24"><path d="M12 0C12 6.62742 6.62742 12 0 12C6.62742 12 12 17.3726 12 24C12 17.3726 17.3726 12 24 12C17.3726 12 12 6.62742 12 0Z"/></svg>
            <!-- Lingkaran Kiri Bawah -->
            <svg class="hidden md:block absolute left-[20%] md:left-[26%] lg:left-[30%] bottom-[10%] w-3 h-3 text-[#284f47] opacity-80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><circle cx="12" cy="12" r="9"/></svg>
            <!-- Bintang Kanan Bawah -->
            <svg class="absolute right-[5%] md:right-[22%] lg:right-[26%] bottom-[15%] md:bottom-0 w-4 h-4 md:w-5 md:h-5 text-[#2b5948] fill-current opacity-90" viewBox="0 0 24 24"><path d="M12 0C12 6.62742 6.62742 12 0 12C6.62742 12 12 17.3726 12 24C12 17.3726 17.3726 12 24 12C17.3726 12 12 6.62742 12 0Z"/></svg>

            <!-- Headline -->
            <h1 class="text-[32px] sm:text-[40px] md:text-[52px] lg:text-[64px] font-sans font-semibold text-[#222] leading-[1.1] md:leading-[1.05] mb-4 md:mb-5 tracking-tight max-w-[1000px] px-2 md:px-0">
                Wujudkan Perubahan Nyata <br class="hidden md:block"> Untuk Lingkungan Kita
            </h1>

            <!-- Subheadline -->
            <p class="text-[14px] md:text-[15px] lg:text-[16px] text-[#4a4a4a] mb-6 md:mb-7 max-w-[700px] font-sans leading-[1.6] px-4 md:px-0">
                Ubah keluhan jadi tindakan. Laporkan isu sekitarmu, akses edukasi interaktif, <br class="hidden md:block"> dan berkolaborasi dengan warga lokal ciptakan lingkungan sehat.
            </p>

            <!-- CTA Button -->
            <a href="#" class="inline-flex items-center justify-center gap-2 bg-[#2a2a2a] text-white px-8 py-3.5 rounded-full font-sans font-medium hover:bg-black transition-all group text-[15px]">
                Lapor Masalah <span class="font-light text-[18px] leading-none mb-[2px] group-hover:translate-x-1 transition-transform">&rarr;</span>
            </a>

        </main>

    </div>

</body>
</html>
